name: Desktop builds

on:
  workflow_dispatch:
  push:
    branches: ['main']
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set build version
        id: buildver
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.${{ github.run_number }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build web assets
        run: npm run build
        env:
          VITE_BUILD_VERSION: ${{ steps.buildver.outputs.version }}
          VITE_BUILD_NUMBER: ${{ github.run_number }}
          VITE_BUILD_COMMIT: ${{ steps.buildver.outputs.sha }}

      - name: Build installers
        # On a v* tag this also attaches the installers to a GitHub Release;
        # manual runs just produce workflow artifacts.
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: ootp-dashboard-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error
